---
# Matches the Debian codename Proxmox VE is pinned to in GUIDE.md's version
# table — used to template the apt sources files in roles/proxmox_host.
debian_codename: "trixie"

# Must match terraform/variables.tf's storage_pool default/tfvars value —
# this is what the terraform@pve token's storage ACL gets scoped to.
proxmox_storage_pool: "local-lvm"

# Must match terraform/variables.tf's network_bridge default/tfvars value —
# this is what the terraform@pve token's SDN ACL gets scoped to.
proxmox_network_bridge: "vmbr0"

# The onboard Intel I219-LM that wedges its TX ring (e1000e "Hardware Unit
# Hang"). It's a bridge port of proxmox_network_bridge above. Targeted by the
# offload workaround in roles/proxmox_host/tasks/e1000e_fix.yml.
e1000e_iface: "nic0"
