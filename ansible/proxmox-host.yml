---
# Separate from site.yml on purpose: this targets the Proxmox hypervisor
# itself, not the k3s cluster — different blast radius, different concern,
# same reasoning that keeps Terraform and Ansible split in this repo.
- name: Proxmox host housekeeping (Phase 1)
  hosts: proxmox_hosts
  become: false   # ansible_user is already root on the hypervisor
  roles:
    - proxmox_host
