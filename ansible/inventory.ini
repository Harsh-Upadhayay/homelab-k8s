# Hosts are addressed by their Tailscale MagicDNS names, not LAN IPs — so this
# inventory works from any tailnet device (e.g. a laptop off the LAN), not just
# a machine with direct 192.168.1.0/24 reachability. Requires the control node
# to be on the tailnet with MagicDNS resolving. The k3s nodes join the tailnet
# via `ansible-playbook site.yml --tags tailscale` (Phase 12 Part A, extended);
# the Proxmox host via `proxmox-host.yml --tags tailscale`. See #29.

[k3s_server]
k3s-server-1 ansible_host=k3s-server-1.egret-pence.ts.net

[k3s_agent]
k3s-worker-1 ansible_host=k3s-worker-1.egret-pence.ts.net
k3s-worker-2 ansible_host=k3s-worker-2.egret-pence.ts.net

[k3s_cluster:children]
k3s_server
k3s_agent

[k3s_cluster:vars]
ansible_user=harsh
ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Arbitary group identifier, created by us
[proxmox_hosts]
pve-dell ansible_host=pve-dell.egret-pence.ts.net

[proxmox_hosts:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/proxmox_ed25519
