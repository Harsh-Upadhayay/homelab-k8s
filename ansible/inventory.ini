# Hosts are addressed by their Tailscale MagicDNS names, not LAN IPs — so this
# inventory works from any tailnet device (e.g. a laptop off the LAN), not just
# a machine with direct 192.168.1.0/24 reachability. Requires the control node
# to be on the tailnet with MagicDNS resolving. The k3s nodes join the tailnet
# via `ansible-playbook site.yml --tags tailscale` (Phase 12 Part A, extended);
# the Proxmox hosts via `proxmox.yml --tags tailscale`. See #29.

# LAN IPs kept commented as a fallback — swap back in if MagicDNS is ever
# misbehaving or you're debugging from a machine with LAN but no tailnet.

[k3s_server]
k3s-server-1 ansible_host=k3s-server-1.egret-pence.ts.net  # ansible_host=192.168.1.21

[k3s_agent]
k3s-worker-1 ansible_host=k3s-worker-1.egret-pence.ts.net  # ansible_host=192.168.1.22
k3s-worker-2 ansible_host=k3s-worker-2.egret-pence.ts.net  # ansible_host=192.168.1.23

[k3s_cluster:children]
k3s_server
k3s_agent

[k3s_cluster:vars]
ansible_user=harsh
ansible_ssh_private_key_file=~/.ssh/id_ed25519

# Hardware groups let one common Proxmox play select per-machine policy.

[proxmox_hw_dell]
pve-dell ansible_host=pve-dell.egret-pence.ts.net  # ansible_host=192.168.1.50

[proxmox_hw_asrock]
pve-asrock ansible_host=pve-asrock.egret-pence.ts.net  # ansible_host=192.168.1.51

[proxmox_hosts:children]
proxmox_hw_dell
proxmox_hw_asrock

[proxmox_hosts:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/proxmox_ed25519
