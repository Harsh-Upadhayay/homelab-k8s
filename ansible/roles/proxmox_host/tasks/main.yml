---
# Host-local Proxmox policy:
#   --tags repositories      configure Proxmox APT repositories
#   --tags maintenance-upgrade
#                            explicit apt update + full-upgrade; skipped by default
# An untagged run applies normal configuration but deliberately skips package
# maintenance because the imported task carries Ansible's special `never` tag.

- name: Configure Proxmox package repositories
  ansible.builtin.import_tasks: repositories.yml
  tags: [repositories]

- name: Explicit Proxmox package maintenance upgrade
  ansible.builtin.import_tasks: upgrade.yml
  tags: [never, maintenance-upgrade]
