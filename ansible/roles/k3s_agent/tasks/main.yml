---
- name: Fail loudly if k3s_token wasn't supplied
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: >-
      k3s_token is not set. Run with:
      ansible-playbook site.yml --extra-vars "k3s_token=<the same value used on the server>"

# ── Data disk (scsi1 → /dev/sdb) — reserved for distributed storage ──
# Terraform provisions this second disk raw and empty on every worker.
# Formatted once here (the filesystem module is a no-op if one already
# exists — it will NOT reformat a disk with data on it), mounted where
# Longhorn expects its default disk when that phase lands.

- name: Format the data disk (no-op if a filesystem already exists)
  community.general.filesystem:
    fstype: ext4
    dev: /dev/sdb
    opts: "-L k3s-data"

- name: Mount the data disk at /var/lib/longhorn (by label — /dev/sdX names can reorder across boots)
  ansible.posix.mount:
    path: /var/lib/longhorn
    src: LABEL=k3s-data
    fstype: ext4
    opts: defaults
    state: mounted

- name: Create /etc/rancher/k3s directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Write k3s agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  notify: restart k3s-agent

- name: Download the k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"

- name: Install k3s agent (pinned version, config.yaml supplies the flags)
  ansible.builtin.command: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "agent"
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s-agent service is enabled and running
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
