---
- name: Fail loudly if k3s_token wasn't supplied
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: >-
      k3s_token is not set. Run with:
      ansible-playbook site.yml --extra-vars "k3s_token=<the same value used on the server>"

- name: Create /etc/rancher/k3s directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Write k3s agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  notify: restart k3s-agent

- name: Download the k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"

- name: Read the installed k3s agent version
  ansible.builtin.command: k3s --version
  register: k3s_agent_installed_version
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install or upgrade the k3s agent to the pinned version
  ansible.builtin.command: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "agent"
  when: >-
    k3s_agent_installed_version.rc != 0
    or k3s_version not in k3s_agent_installed_version.stdout

- name: Ensure k3s-agent service is enabled and running
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
