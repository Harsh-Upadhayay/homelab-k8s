---
- name: Fail loudly if k3s_token wasn't supplied
  ansible.builtin.assert:
    that:
      - k3s_token is defined
      - k3s_token | length > 0
    fail_msg: >-
      k3s_token is not set. Run with:
      ansible-playbook site.yml --extra-vars "k3s_token=$(openssl rand -hex 32)"
      (reuse the SAME value on every subsequent run — it's the cluster join secret)

- name: Create /etc/rancher/k3s directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Write k3s server config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0600"
  notify: restart k3s

- name: Download the k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/install-k3s.sh
    mode: "0755"

- name: Install k3s server (pinned version, config.yaml supplies the flags)
  ansible.builtin.command: /tmp/install-k3s.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "server"
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

- name: Wait for the API server to report ready
  ansible.builtin.wait_for:
    port: 6443
    host: "{{ ansible_host }}"
    timeout: 180

- name: Wait for node-token to exist (confirms cluster bootstrap finished)
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Fetch kubeconfig from the server
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ local_kubeconfig_path }}"
    flat: true
  become: true

- name: Point the local kubeconfig at the server's real IP (it defaults to 127.0.0.1)
  ansible.builtin.replace:
    path: "{{ local_kubeconfig_path }}"
    regexp: "https://127\\.0\\.0\\.1:6443"
    replace: "https://{{ ansible_host }}:6443"
  delegate_to: localhost
  become: false

- name: Set readable permissions on the local kubeconfig
  ansible.builtin.file:
    path: "{{ local_kubeconfig_path }}"
    mode: "0600"
  delegate_to: localhost
  become: false
