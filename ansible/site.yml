---
- name: Base OS prep — every node
  hosts: k3s_cluster
  become: true
  roles:
    - role: k3s_node
    - role: tailscale_host
      vars:
        tailscale_apt_distro: "ubuntu"
        tailscale_apt_codename: "{{ ubuntu_codename }}"
      tags: [never, tailscale]

- name: Install and bootstrap the k3s control plane
  hosts: k3s_server
  become: true
  roles:
    - k3s_server

- name: Join workers to the cluster
  hosts: k3s_agent
  become: true
  roles:
    - role: longhorn_node
      tags: [longhorn]
    - role: k3s_agent
