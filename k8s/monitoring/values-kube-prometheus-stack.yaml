# kube-prometheus-stack Helm chart values. Chart version pinned at install
# time (ADR-0027 precedent — never ride a chart's latest):
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace --version 87.10.1 \
#     -f k8s/monitoring/values-kube-prometheus-stack.yaml
#
# Namespace: monitoring (upstream-conventional — same reasoning as ADR-0032:
# every dashboard/doc/example assumes this name).
#
# Storage: upstream ships NO persistence and NO resource requests by default
# for any of the three stateful pieces below (confirmed against the chart's
# own values.yaml) — an emptyDir TSDB loses all history on every pod
# restart. Explicit storageClassName per ADR-0031 (no cluster default to fall
# back on); tier is `longhorn` (1 copy, dev) not `longhorn-replicated` —
# metrics are inherently re-collected over time, so losing history to a
# worker failure is low-stakes, unlike real application data.

prometheus:
  prometheusSpec:
    # Chart default (serviceMonitorSelectorNilUsesHelmValues: true, etc.) is
    # NOT actually the "empty selector, watches everything" behavior an
    # earlier pass through this file assumed — left unset, the chart scopes
    # Prometheus to only its own ServiceMonitors (matchLabels: {release:
    # kube-prometheus-stack}). Confirmed live: Longhorn's and Traefik's own
    # bundled ServiceMonitors (issue #25) never appeared in Prometheus's
    # targets or even its generated scrape config until this was set to
    # false. This is what actually makes selectors empty ({}) and gives
    # cluster-wide auto-discovery of any ServiceMonitor/PodMonitor, from any
    # chart, with no additional per-install label needed.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 400Mi
      limits:
        memory: 1Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

grafana:
  # Pinned rather than left to the chart's default `<release>-grafana` name —
  # a known, stable Service name means ingressroute-grafana.yaml never needs
  # a post-install `kubectl get svc` lookup to fill in, on this cluster or a
  # rebuilt one.
  fullnameOverride: grafana
  # Admin credentials pinned to an externally-managed Secret instead of the
  # chart's default (a random password generated once, then left alone —
  # which ArgoCD and Helm each think they own, fighting every sync). Secret
  # created imperatively (`kubectl create secret`), never committed, per this
  # repo's secrets convention. Setting existingSecret makes the chart skip
  # rendering Secret/grafana entirely, so there's nothing left to drift.
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  # This platform never uses raw Ingress — every internal service gets a
  # hand-written IngressRoute instead (ingressroute-grafana.yaml), same as the
  # Longhorn UI (ADR-0033). Grafana's own Ingress support stays off.
  ingress:
    enabled: false
  # No auth, full stop — matches the Longhorn UI precedent (ADR-0033):
  # reachability via the Tailscale-only IngressRoute IS the authentication,
  # deliberately, not a gap. Unlike Longhorn this isn't "nothing to disable" —
  # Grafana's own login was a free extra layer being removed on purpose.
  # org_role: Admin means anyone who reaches grafana.in.neovara.uk gets full
  # admin (matching Longhorn's own no-auth blast radius), and
  # disable_login_form hides the login screen entirely rather than just
  # bypassing it silently.
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Admin
    auth:
      disable_login_form: true
  # Provisioned declaratively — no click-ops. kube-prometheus-stack already
  # provisions its own Prometheus datasource this exact way; this is the same
  # mechanism (Grafana's file-based datasource provisioning, just expressed
  # as chart values instead of a UI form) applied to Loki.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100 # the pinned Service name from values-loki.yaml
      isDefault: false
  # Chart-native dashboard import: an init container curls each JSON straight
  # from grafana.com by gnetId/revision at pod start, so the platform commits
  # a version number instead of a copy-pasted dashboard export. Replaces the
  # old pattern (k8s/traefik/manifests/grafana-dashboard.yaml and
  # k8s/longhorn/manifests/grafana-dashboard.yaml — hand-exported JSON in a
  # ConfigMap labeled grafana_dashboard: "1", picked up by the sidecar). Both
  # mechanisms feed the same Grafana instance and can coexist, but there's no
  # reason to keep hand-copied JSON around once this is in place.
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: platform
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/platform
  dashboards:
    platform:
      traefik:
        # https://grafana.com/grafana/dashboards/17347-traefik-official-kubernetes-dashboard/
        gnetId: 17347
        revision: 9
        datasource: Prometheus
      longhorn:
        # https://grafana.com/grafana/dashboards/17626
        gnetId: 17626
        revision: 1
        datasource: Prometheus
      argocd:
        # https://grafana.com/grafana/dashboards/14584-argocd/
        gnetId: 14584
        revision: 1
        datasource: Prometheus
      cert-manager:
        # https://grafana.com/grafana/dashboards/20850-cert-manager/
        # Newer dashboard schema (schemaVersion 39): datasource is a
        # {type, uid} object, not the flat string the four dashboards above
        # use — so the plain `datasource: Prometheus` mechanism (a blunt
        # `"datasource":.*,` -> literal-string replace, confirmed against
        # this chart's own download script) never matches it, and the *value*
        # has to be the datasource's real uid ("prometheus", lowercase — see
        # kube-prometheus-stack-grafana-datasource ConfigMap) rather than its
        # display name. List form does a plain `${name}` token replace
        # instead, wherever it appears in the raw JSON.
        gnetId: 20850
        revision: 1
        datasource:
          - name: datasource
            value: prometheus
      argo-rollouts:
        # Deliberately NOT grafana.com's "k8s-argo-rollout" (gnetId 15386,
        # top hit by name) — its panels query istio_requests_total /
        # istio_tcp_*_bytes_total, an Istio dashboard mislabeled with this
        # project's name, caught only by reading its raw JSON rather than
        # trusting the title. This is Argo Rollouts' own example dashboard
        # from its GitHub repo (the real upstream source, not on grafana.com
        # at all), pinned to the exact appVersion live (argo-rollouts
        # values.yaml, chart 2.41.0 -> appVersion v1.9.0) — old-style flat
        # `"datasource": "$datasource"` schema, same substitution mechanism
        # as traefik/longhorn/argocd above.
        url: https://raw.githubusercontent.com/argoproj/argo-rollouts/v1.9.0/examples/dashboard.json
        datasource: Prometheus
      loki:
        # grafana.com has no official Loki gnetId upload (the marketplace
        # results under "Loki" are all third-party log-viewer dashboards).
        # This is the real upstream source: the "Operational" dashboard from
        # Loki's own mixin, compiled and committed straight to the loki repo,
        # pinned to the exact appVersion live (values-loki.yaml, chart 7.0.0
        # -> appVersion 3.6.7). Flat `"datasource": "$datasource"` /
        # `"$loki_datasource"` schema (Grafana Labs' standard mixin
        # convention — same shape Alloy's mixin uses below), so this is
        # name-based like the four Prometheus-only dashboards above, just
        # with two names to substitute instead of one.
        # ~15 of its 106 panels (percentile latency) depend on recording
        # rules this platform doesn't install (monitoring.rules in
        # values-loki.yaml stays off — that's alerting-policy scope, not
        # metrics-enablement) and will read "No data" until/unless added.
        url: https://raw.githubusercontent.com/grafana/loki/v3.6.7/production/loki-mixin-compiled/dashboards/loki-operational.json
        datasource:
          - name: datasource
            value: Prometheus
          - name: loki_datasource
            value: Loki
      alloy:
        # Same situation as Loki above: no grafana.com gnetId, real upstream
        # is the alloy-mixin compiled straight into grafana/alloy's own repo.
        # "Resources" (CPU/memory/component health) rather than "Cluster"
        # (alloy-cluster-overview.json) — this platform runs one Alloy
        # Deployment replica with clustering not configured, so there's no
        # cluster to overview. Pinned to the exact appVersion live
        # (values-alloy.yaml, chart 1.10.0 -> appVersion v1.17.0). One
        # panel (the "filters" ad-hoc variable) uses the newer {type, uid}
        # object form and won't resolve (its uid ends up "Prometheus", not
        # the real lowercase "prometheus") — harmless, it's an optional
        # ad-hoc filter dropdown, not a data panel.
        url: https://raw.githubusercontent.com/grafana/alloy/v1.17.0/operations/alloy-mixin/rendered/dashboards/alloy-resources.json
        datasource:
          - name: datasource
            value: Prometheus
          - name: loki_datasource
            value: Loki
      cloudflared:
        # https://grafana.com/grafana/dashboards/24874-cloudflare-tunnel/
        # Newer {type, uid} schema like cert-manager above — value is the
        # real lowercase datasource uid, not the display name.
        gnetId: 24874
        revision: 4
        datasource:
          - name: DS_PROMETHEUS
            value: prometheus
      tailscale:
        # https://grafana.com/grafana/dashboards/24178-tailscale-machine/
        # Feeds off the ProxyClass in k8s/tailscale/proxyclass-monitoring.yaml
        # — only the traefik-internal proxy is instrumented, so this dashboard
        # has a fleet of one. Its $cluster filter variable lists no options:
        # this single-cluster stack has no "cluster" label anywhere
        # (kube-prometheus-stack doesn't relabel one in — that's a Thanos /
        # Grafana Cloud remote-write convention, not a local one). The
        # dashboard filters with EXACT equality (cluster="$cluster"), not
        # regex — verified by reading its raw JSON, all 28 panels. That still
        # resolves: with no options the variable is empty, and PromQL
        # cluster="" matches series where the label is absent entirely, so
        # panels populate. Same {type, uid} schema as cert-manager/cloudflared.
        # CAVEAT: the ProxyClass metrics path is upstream-"unstable" (see
        # proxyclass-monitoring.yaml) and brand-new here, so confirm these
        # panels actually render after the first apply. If a variable
        # defaults to $__all instead of empty (a literal-string mismatch that
        # reads "No data"), the fix is a relabel_configs on the operator-
        # generated ServiceMonitor adding a cluster label — NOT a dashboard
        # swap.
        gnetId: 24178
        revision: 4
        datasource:
          - name: datasource
            value: prometheus

kubeStateMetrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi

# k3s runs kube-scheduler/kube-controller-manager/etcd inside its own single
# binary, not as pods — so the chart's default Service selectors
# (component: kube-scheduler, etc.) never match anything (issue #25). These
# endpoints tell the chart's own Services to point at the real node IP
# instead of discovering pods, once k3s_server's Ansible role (see
# kube-controller-manager-arg/kube-scheduler-arg/etcd-expose-metrics in
# config.yaml.j2) has opened each component's metrics listener beyond
# 127.0.0.1. Single-server cluster today (ADR-0008) — one IP is the whole
# list; a future HA control plane would add its other members here too.
kubeControllerManager:
  endpoints:
    - 192.168.1.21
  serviceMonitor:
    # Self-signed cert from k3s's internal CA, not a publicly-trusted one —
    # same trust boundary as every other in-cluster TLS hop on this platform.
    insecureSkipVerify: true

kubeScheduler:
  endpoints:
    - 192.168.1.21
  serviceMonitor:
    insecureSkipVerify: true

kubeEtcd:
  endpoints:
    - 192.168.1.21
  # No serviceMonitor.scheme/insecureSkipVerify override needed here — etcd's
  # --etcd-expose-metrics listener is plain HTTP by design (a separate,
  # unauthenticated metrics-only port, not the mTLS client/peer ports).
