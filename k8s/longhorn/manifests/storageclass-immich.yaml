# Retained storage classes created during the Immich migration and now adopted
# by the Longhorn GitOps bundle. Retain protects the Longhorn volume if a PVC is
# deleted; PVC Prune=false annotations add a separate GitOps guardrail.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-immich-hdd-retain
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  backupBlockSize: "16777216"
  backupTargetName: default
  dataEngine: v1
  diskSelector: immich-hdd
  fsType: ext4
  nodeSelector: immich-migration
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-immich-db-retain
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  backupTargetName: default
  dataEngine: v1
  fsType: ext4
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
