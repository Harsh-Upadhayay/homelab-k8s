# The PROD storage tier: same driver as the chart's `longhorn` StorageClass,
# but every volume keeps 2 copies of its data — one per worker (replica
# anti-affinity is hard by default, so they can never co-locate).
#
# This is the mechanism for per-app data-replica policy: a PVC cannot set a
# replica count itself (numberOfReplicas is a StorageClass *parameter*), so
# "dev = 1 copy, prod = 2 copies" is expressed by which storageClassName the
# PVC names — `longhorn` vs `longhorn-replicated`.
#
# Shape mirrors the chart's own generated StorageClass (helm template output),
# including volumeBindingMode: Immediate — unlike local-path, a Longhorn
# volume isn't pinned to whichever node the first pod lands on, so there's
# nothing to gain by waiting for the scheduler.
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-replicated
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
  fromBackup: ""
