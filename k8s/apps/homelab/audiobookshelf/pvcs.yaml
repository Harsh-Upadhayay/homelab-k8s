# Preserve upstream's four independent mount boundaries. In particular,
# /config contains the SQLite database and must stay on an RWO block filesystem
# (never RWX/NFS/SMB). Config, metadata, and podcasts use the prod 2-copy tier.
# Audiobooks are reproducible bulk media and use the 1-copy tier to avoid spending
# another 70 GiB on a second replica; the untouched Compose source is the rollback.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-config
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-metadata
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # A new name is required because a bound PVC's storageClassName is immutable.
  name: audiobookshelf-audiobooks-single
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 70Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-podcasts
  namespace: audiobookshelf
  labels:
    app.kubernetes.io/name: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 5Gi
