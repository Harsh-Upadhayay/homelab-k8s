# PUBLIC (cutover complete): audiobookshelf.neovara.uk via cloudflared ->
# Traefik's `web` entrypoint. TLS terminates at Cloudflare's edge. The temporary
# audiobookshelf.in.neovara.uk validation route is retired after acceptance.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: strict-origin-when-cross-origin
    # Deliberately no CORS settings: upstream documents that Traefik CORS
    # middleware can make Audiobookshelf login fail with "Unknown Error".
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`audiobookshelf.neovara.uk`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
      middlewares:
        - name: secure-headers
