# Internal-only validation route. Public traffic remains on the old Compose
# instance until migrated state, login, playback, WebSockets and upgrades are
# all verified. Empty tls:{} selects the platform's default *.in.neovara.uk cert.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: strict-origin-when-cross-origin
    # Deliberately no CORS settings: upstream documents that Traefik CORS
    # middleware can make Audiobookshelf login fail with "Unknown Error".
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-internal
  namespace: audiobookshelf
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`audiobookshelf.in.neovara.uk`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
      middlewares:
        - name: secure-headers
  tls: {}
