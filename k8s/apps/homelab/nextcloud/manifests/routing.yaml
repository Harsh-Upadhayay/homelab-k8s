# Routing for Nextcloud. The Helm chart's own `ingress` produces a vanilla
# networking.k8s.io Ingress; this platform routes with Traefik's IngressRoute CRD,
# so ingress.enabled=false in values.yaml and we supply the CRDs here (companion
# manifests, same split as k8s/traefik/manifests/).
#
# PUBLIC (cutover complete): nextcloud.neovara.uk via cloudflared -> Traefik's `web`
# entrypoint (TLS terminated at Cloudflare's edge, same public path as kiroku/whoami).
# The internal-only nextcloud.in.neovara.uk route is retired — DNS now points the
# public name at this instance, so the *.in name carries no traffic. See
# docs/migrations/nextcloud.md.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: nextcloud
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    referrerPolicy: strict-origin-when-cross-origin
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-uploads
  namespace: nextcloud
spec:
  # 10 GiB request-body buffer so large uploads aren't capped by the proxy
  # (mirrors the old Compose buffering.maxRequestBodyBytes middleware).
  buffering:
    maxRequestBodyBytes: 10737418240
    memRequestBodyBytes: 10737418240
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  entryPoints:
    - web # plain HTTP inside the cluster — cloudflared holds the TLS-terminated edge
  routes:
    - match: Host(`nextcloud.neovara.uk`)
      kind: Rule
      services:
        - name: nextcloud # the chart's Service (named after the release: "nextcloud")
          port: 8080
      middlewares:
        - name: secure-headers
        - name: nextcloud-uploads
