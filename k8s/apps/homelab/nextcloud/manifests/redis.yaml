# Redis — Nextcloud's distributed cache + transactional file locking (memcache.
# distributed / memcache.locking in config.php). Pure THROWAWAY state: it holds
# only cache and locks, nothing durable, so it is NOT migrated — a fresh empty
# redis is correct (first example of "rebuild the stateless dependency, don't move
# it"). No PVC, no volume.
#
# No auth: the source redis runs with no requirepass (verified: redis-cli PING
# succeeds unauthenticated), and config.php's redis credentials are inert against
# it. Matching that here keeps the migrated config.php working unchanged. Redis is
# reachable only in-namespace over ClusterIP — never exposed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud-redis
  namespace: nextcloud
  labels:
    app: nextcloud-redis
    app.kubernetes.io/part-of: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud-redis
  template:
    metadata:
      labels:
        app: nextcloud-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999 # redis image's default 'redis' user
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8-alpine
          args: ["--save", "", "--appendonly", "no"] # cache-only: disable persistence entirely
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-redis # config.php's redis host is "nextcloud-redis" — keep the name
  namespace: nextcloud
  labels:
    app: nextcloud-redis
spec:
  type: ClusterIP
  selector:
    app: nextcloud-redis
  ports:
    - port: 6379
      targetPort: 6379
