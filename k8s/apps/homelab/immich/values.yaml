# Official immich-app community chart 0.13.1 defaults to Immich v3.0.0. Pin
# both the server and CPU-only ML images to the targeted v3.0.3 patch release.
# The required v2.7.3 VectorChord migration completed before this image bump.
#
# WORKSTATION REBUILD MAINTENANCE (2026-07-22 JST): the application components
# are intentionally disabled so the one-replica library volume can detach before
# /dev/sdb2 is preserved through the Proxmox installation. PostgreSQL remains
# online on its separately replicated PVC. Set the three enabled flags below
# back to true only after the library has been recovered onto managed storage.
controllers:
  main:
    containers:
      main:
        image:
          tag: v3.0.3

immich:
  metrics:
    enabled: false # Prometheus Operator is intentionally stopped by the operator.
  persistence:
    # The chart requires an independently-created library PVC.
    library:
      existingClaim: immich-library

server:
  enabled: false
  controllers:
    main:
      # One server writes one RWO library. Recreate guarantees no overlapping
      # writers and avoids a RollingUpdate Multi-Attach race.
      strategy: Recreate
      containers:
        main:
          env:
            DB_HOSTNAME: immich-postgres
            DB_PORT: "5432"
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_USERNAME
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_PASSWORD
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_DATABASE_NAME
            TZ: Asia/Tokyo
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 8Gi
  persistence:
    # Chart 0.13.1 mounts the claim at the upstream-standard /data. Every
    # restored asset row still stores the historical /usr/src/app/upload prefix,
    # so mount the SAME claim at that legacy path. The v3.0.3 acceptance check
    # must pass before a separate path-normalization change can remove it.
    legacy-library:
      existingClaim: immich-library
      globalMounts:
        - path: /usr/src/app/upload

machine-learning:
  enabled: false
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 12Gi
  # CPU-only image; model cache is intentionally ephemeral for this transition.
  persistence:
    cache:
      enabled: true
      type: emptyDir

valkey:
  enabled: false
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 512Mi
  persistence:
    data:
      enabled: true
      type: emptyDir
