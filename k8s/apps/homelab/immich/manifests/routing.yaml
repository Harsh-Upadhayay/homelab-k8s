# Temporary internal-only acceptance route: tailnet -> Traefik websecure ->
# chart-managed ClusterIP Service. The empty tls block uses the cluster-wide
# *.in.neovara.uk default TLSStore certificate.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich-internal
  namespace: immich
  labels:
    app.kubernetes.io/part-of: immich
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`immich.in.neovara.uk`)
      kind: Rule
      services:
        - name: immich-server
          port: 2283
  tls: {}
