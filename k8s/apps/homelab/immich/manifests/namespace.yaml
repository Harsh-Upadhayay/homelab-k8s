apiVersion: v1
kind: Namespace
metadata:
  name: immich
  labels:
    group: homelab
    app.kubernetes.io/name: immich
    app.kubernetes.io/part-of: immich
  annotations:
    # The namespace contains retained authoritative PVCs; never prune it as an
    # incidental consequence of removing or refactoring the Application.
    argocd.argoproj.io/sync-options: Prune=false
