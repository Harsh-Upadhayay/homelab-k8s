# Dedicated PostgreSQL 14. This is the official Immich v2.7.3 compatibility
# image: it contains the existing pgvecto.rs 0.2.0 extension plus pgvector and
# VectorChord 0.4.3, allowing the supported automatic transition before v3.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-postgres
  namespace: immich
  labels:
    app: immich-postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: immich
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-postgres
  template:
    metadata:
      labels:
        app: immich-postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: immich
    spec:
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_DATABASE_NAME
            - name: POSTGRES_INITDB_ARGS
              value: --data-checksums
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - bash
                - -lc
                - pg_isready --dbname="$POSTGRES_DB" --username="$POSTGRES_USER"
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -lc
                - pg_isready --dbname="$POSTGRES_DB" --username="$POSTGRES_USER"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Docker Compose specifies 128 MiB shm_size; Kubernetes otherwise
            # gives the container a much smaller default /dev/shm.
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: immich-postgres
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgres
  namespace: immich
  labels:
    app: immich-postgres
    app.kubernetes.io/part-of: immich
spec:
  type: ClusterIP
  selector:
    app: immich-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
