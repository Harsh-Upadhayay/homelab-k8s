# Least-privilege deployer identity for the kiroku namespace.
#
# WHY THIS EXISTS in a GitOps world: ArgoCD itself does the actual deploying
# (its application-controller has broad rights). This 'deployer' ServiceAccount
# is the SCOPED identity to hand a collaborator or a CI pipeline that needs
# DIRECT (kubectl / API) access to just this one namespace — the friend/shared
# case (Option E group 3c), and the CKA RBAC exercise made concrete.
#
# Deliberately NOT the built-in 'edit' ClusterRole: `edit` grants full
# read/write on `secrets` (verified: kubectl describe clusterrole edit | grep
# secret). This repo's convention is that the OPERATOR creates secrets
# imperatively (never committed), so a deployer needs no secret access at all —
# omitting it removes the exfiltration surface. This Role also grants NO access
# to RBAC objects, ResourceQuota, or LimitRange, so a deployer can't raise its
# own limits or escalate.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: kiroku
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: kiroku
rules:
  # Core workload + config objects (NO secrets — see header).
  - apiGroups: [""]
    resources: [pods, pods/log, services, configmaps, persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  # Deployments / StatefulSets / ReplicaSets.
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Batch workloads.
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  # Traefik routing CRDs (the app's own ingress).
  - apiGroups: ["traefik.io"]
    resources: [ingressroutes, middlewares]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: kiroku
roleRef: # namespaced Role -> RoleBinding: perms apply only in the kiroku namespace
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployer
subjects:
  - kind: ServiceAccount
    name: deployer
    namespace: kiroku
  - kind: User
    name: "tailnet-collaborators"
