# Child Application: Traefik — chart + companions bundled. Originally
# migrated as chart-only (the first proof-of-concept adoption, ADR-0044);
# the four hand-written companion objects in k8s/traefik/manifests/ (the
# default TLSStore, the dashboard Service, the tailscale loadBalancer
# Service, the Grafana dashboard ConfigMap) were left on manual kubectl
# apply at that time. This third source brings them under the same
# Application now — they already exist live, so first sync adopts them with
# a tracking-annotation-only diff, exactly like the chart itself was adopted.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 41.0.1 # matches the version already live (ADR-0027) — first sync should be a no-op diff
      helm:
        valueFiles:
          - $values/k8s/traefik/values.yaml
    - repoURL: https://github.com/Harsh-Upadhayay/homelab-k8s.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Harsh-Upadhayay/homelab-k8s.git
      targetRevision: main
      path: k8s/traefik/manifests # companion objects (TLSStore, Services, dashboard ConfigMap)
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
