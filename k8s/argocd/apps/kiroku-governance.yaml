# Governance Application for the kiroku (personal) namespace. PLATFORM-OWNED:
# creates the namespace + ResourceQuota + LimitRange + deployer RBAC from THIS
# repo (k8s/apps/personal/kiroku/). It lives in the `default` project because it
# creates a Namespace + RBAC — cluster/namespaced-admin that the locked-down
# `personal` project deliberately forbids. See docs/Migration Plan.md (Option E).
#
# sync-wave "0": root applies (and health-gates) this before the workload
# pointer Application (wave 1), so the namespace + quota exist before any pod
# tries to land in them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiroku-governance # provisions the namespace AND quota + limitrange + RBAC
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Harsh-Upadhayay/homelab-k8s.git
    targetRevision: main
    path: k8s/apps/personal/kiroku
  destination:
    server: https://kubernetes.default.svc
    namespace: kiroku
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false # namespace.yaml in the bundle creates it
