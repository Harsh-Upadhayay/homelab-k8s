# cloudflared already serves Prometheus metrics (deployment.yaml's
# `--metrics 0.0.0.0:2000` — originally added for the /ready liveness probe,
# not for scraping). This Service is the only thing missing for Prometheus to
# reach it: kube-prometheus-stack's Prometheus already watches ServiceMonitors
# cluster-wide (empty selectors, values-kube-prometheus-stack.yaml), and the
# NetworkPolicy (networkpolicy.yaml) only restricts cloudflared's *egress* —
# there's no ingress rule blocking a scrape into port 2000.
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: cloudflare
  labels:
    app: cloudflared
spec:
  type: ClusterIP
  selector:
    app: cloudflared
  ports:
    - name: metrics
      port: 2000
      targetPort: 2000
