# Without this, cloudflared has the same network reach as any pod in the
# cluster — standard Kubernetes service discovery would let it resolve and
# connect to every Service in every namespace (your databases, your
# Traefik dashboard, everything), because Cloudflare's own quickstart
# guide sets up the tunnel with zero network restriction by default.
#
# This is the one place a compromised public-facing component becomes a
# pivot point if left unrestricted. With this policy, cloudflared can reach
# Traefik on port 8000 and nothing else — confirming k3s's bundled netpol
# controller enforces this even on plain Flannel, no Cilium required.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-restrict-egress
  namespace: cloudflare
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
  egress:
    # DNS — needed to resolve Traefik's ClusterIP and to reach Cloudflare's edge
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Traefik — the only in-cluster destination cloudflared should ever reach.
    # Port is 8000 (the pod's targetPort), NOT 80 (the Service port cloudflared
    # dials): a namespaceSelector matches the destination *pod*, and this egress
    # rule is evaluated AFTER kube-proxy has already DNAT'd the ClusterIP:80
    # connection to podIP:8000. So the wire port the policy sees is 8000.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8000
    # Cloudflare's edge — the outbound tunnel itself. Port 7844 is required on
    # BOTH UDP (quic, the default) and TCP (http2, the fallback when UDP is
    # blocked/degraded) per Cloudflare's firewall docs. TCP 443 is optional —
    # software-update checks and post-quantum reporting — kept for those.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: UDP
          port: 7844
        - protocol: TCP
          port: 7844
        - protocol: TCP
          port: 443
