# Tailscale Kubernetes Operator values.
# Installed via Helm — see GUIDE.md Phase 12 for the OAuth client + ACL
# tag setup this depends on.

apiServerProxyConfig:
  # Lets you reach the Kubernetes API server over the tailnet without ever
  # exposing 6443 publicly or needing a separate subnet-router route just
  # for the API. `tailscale configure kubeconfig <operator-magicdns-name>`
  # from any device on your tailnet is all that's needed afterward.
  mode: "true"

operatorConfig:
  # Reasonable default; bump to "debug" temporarily if something's not
  # joining the tailnet as expected.
  logging: info
