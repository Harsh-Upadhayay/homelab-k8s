# The INTERNAL route for whoami — second front door to the same app.
# Public twin: ingressroute.yaml (web entrypoint, whoami.neovara.uk, TLS at
# Cloudflare's edge). This one: websecure entrypoint, *.in name, TLS terminated
# by Traefik itself with the cert-manager wildcard — reachable only over
# Tailscale, since the websecure entrypoint is exposed solely through the
# traefik-internal Service (k8s/traefik/tailscale-service.yaml).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-internal
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.in.neovara.uk`)
      kind: Rule
      services:
        - name: whoami-stable
          port: 80
  tls: {}   # empty = enable TLS, serve the default TLSStore cert (*.in.neovara.uk)
