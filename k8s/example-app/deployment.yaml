# Minimal known-good app for proving the whole path works before you
# deploy anything real. traefik/whoami just echoes request headers back —
# useful for confirming routing, not meant to stay deployed long-term.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          ports:
            - containerPort: 80
