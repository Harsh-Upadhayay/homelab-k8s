# Internal-ONLY route for the Argo Rollouts dashboard — same shape as every
# other operator dashboard on this platform (Grafana, Longhorn, ArgoCD,
# Traefik): websecure entrypoint, *.in name, default TLSStore wildcard cert,
# reachable only through the traefik-internal Tailscale Service.
#
# The dashboard has NO authentication of its own (like Longhorn's UI,
# ADR-0033) and — with readonly:false in values.yaml — can promote/abort
# live rollouts. It must never get a public (web-entrypoint / Cloudflare)
# twin; network position on the tailnet is the sole gate.
#
# Lives in argo-rollouts (this app's namespace) because Traefik resolves
# same-namespace Services only (allowCrossNamespace is off in our chart
# values) — same reason every other app's IngressRoute sits in its own ns.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-rollouts-dashboard-internal
  namespace: argo-rollouts
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rollouts.in.neovara.uk`)
      kind: Rule
      services:
        - name: argo-rollouts-dashboard # chart's dashboard Service, ClusterIP :3100
          port: 3100
  tls: {} # empty = enable TLS, serve the default TLSStore cert (*.in.neovara.uk)
