# argo-rollouts Helm chart values.
# Controller + CRDs (Rollout, AnalysisTemplate, AnalysisRun, Experiment).
# No Rollout object exists yet to canary, since no real app is deployed
# beyond the throwaway whoami example — the canary/blue-green example (a
# Rollout + TraefikService, weighted steps) is deferred to whenever the
# first real app lands (issue #26); Traefik's integration needs no plugin,
# just the TraefikService CRD Traefik already ships (native support).

controller:
  replicas: 1
  # Argo Rollouts' Traefik integration defaults to querying the legacy
  # traefik.containo.us CRD group (Traefik v2). This cluster runs Traefik
  # v3, which only registers traefik.io — the RBAC covers both groups, but
  # the controller's *default* still had to be told which one to actually
  # use, or every reconcile 404s before touching anything (confirmed via
  # controller logs: "Reconciling TrafficRouting with type 'Traefik'" /
  # "the server could not find the requested resource", repeating for every
  # sync). Source: cmd/rollouts-controller/main.go's --traefik-api-group flag.
  extraArgs:
    - --traefik-api-group=traefik.io
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  # Chart default is false (no metrics Service, no ServiceMonitor). Prometheus
  # already watches cluster-wide (empty selectors, values-kube-prometheus-
  # stack.yaml), so flipping both on is enough to feed the Grafana dashboard
  # (the project's own examples/dashboard.json, values-kube-prometheus-
  # stack.yaml — NOT grafana.com's "k8s-argo-rollout" gnetId 15386, which
  # turned out to be a mislabeled Istio dashboard, verified against its raw
  # JSON, not just its title).
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

dashboard:
  enabled: true
  # Full (read-write) access, deliberately: readonly:false keeps the
  # promote/abort/retry buttons live in the UI, matching every other
  # operator dashboard on this platform (Grafana, Longhorn, ArgoCD) which
  # are all full-access behind the same gate. That gate is network position,
  # not the app's own auth: the dashboard ships with NO authentication of its
  # own (same as Longhorn's UI, ADR-0033), and is reachable ONLY through the
  # traefik-internal Tailscale front door via manifests/ingressroute.yaml —
  # off-tailnet the name doesn't even resolve. If the tailnet is ever shared
  # with other users, revisit (readonly:true, or real auth), same caveat as
  # ADR-0033.
  readonly: false
  createClusterRole: true # dashboard needs cluster-wide read RBAC to see Rollouts in every namespace
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi
