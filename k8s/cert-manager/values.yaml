# cert-manager Helm chart values.
# Until this file existed, cert-manager was installed with a bare
# `--set crds.enabled=true` and no committed values file at all — the only
# override that mattered. Promoted to a real file now that the install is
# moving under GitOps (k8s/argocd/apps/cert-manager.yaml), so the chart
# renders identically from Git as it does from the live Helm release.
#
# CRDs kept inside the chart (gated by this flag) rather than applied
# separately the way Traefik's are — a per-maintainer convention; see
# Kubernetes Concepts.md "Two charts, two opposite conventions for the same
# CRD-lifecycle problem."
crds:
  enabled: true

# Prometheus metrics were already on by default (chart default:
# prometheus.enabled: true, controller/webhook serving on their http-metrics
# port) — confirmed via `helm show values` for this exact pinned version.
# What was missing is a ServiceMonitor to actually scrape it; kube-prometheus-
# stack's Prometheus already watches cluster-wide (empty selectors), so this
# is the only change needed. Feeds the Grafana dashboard (gnetId 20850,
# values-kube-prometheus-stack.yaml).
prometheus:
  enabled: true
  servicemonitor:
    enabled: true
