# A second, separate Service pointed at the same Traefik pods, exposing
# ONLY the internal dashboard/api port (9000). The chart's main Service
# (created by values.yaml) deliberately does not include this port, so the
# dashboard is unreachable except through this Service.
#
# type: LoadBalancer + loadBalancerClass: tailscale is how the Tailscale
# Kubernetes Operator (Phase 12) claims a Service and joins it to your
# tailnet directly — no public exposure, ever; reachable only from devices
# on your tailnet, by its MagicDNS name (kubectl get svc will show it once
# the operator's picked it up).
apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-traefik
  ports:
    - name: dashboard
      port: 9000
      targetPort: 9000
